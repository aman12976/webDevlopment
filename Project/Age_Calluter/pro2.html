<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>

    
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

  
    <link rel="stylesheet" href="pro2.css" />
</head>
<body>

    <div class="tippage ">
        <div class="calcu ">TIP CALCULATOR</div>

        <div class="tipbody">
          
            <div class="mb-4">
                <label class="form-label">Bill Amount</label>
                <div class="input-group">
                    <input
                        type="number"
                        id="billAmount"
                        class="form-control"
                        placeholder="Enter bill amount"
                    />
                    <span class="input-group-text">₹</span>
                </div>
            </div>

            
            <div class="mb-4">
                <label class="form-label">How was the service?</label>
                <select id="serviceQuality" class="form-select">
                    <option value="0.25">25% - Top Notch</option>
                    <option value="0.20">20% - Excellent</option>
                    <option value="0.15">15% - Good</option>
                    <option value="0.10">10% - Bad</option>
                    <option value="0.05">5% - Worst</option>
                </select>
            </div>

          
            <div class="mb-4">
                <label class="form-label">Total number of persons</label>
                <input
                    type="number"
                    id="persons"
                    class="form-control"
                    placeholder="Enter number of persons"
                />
            </div>

            
            <button class="btn btn-calculate" onclick="calculateTip()">
                Calculate
            </button>

          
            <div class="result" id="result">
                <p class="result-text">Amount Each Person Should Pay</p>
                <h2 id="perPersonAmount">₹0.00</h2>
                <p class="small-text">including tip</p>
            </div>
        </div>
    </div>

    <script src="pro2.js"></script>
</body>
</html>
