<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Number</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  
  <link rel="stylesheet" href="pro3.css">
</head>
<body>

  <div class="container">
    <div class="game-box">
      <h1 class="display-4 fw-bold mb-4">Guess The Number</h1>

      <p class="fs-4">
        We have selected a random number between 1 - 10.
        See if you can guess it.
      </p>

      <div class="row g-3 align-items-center mt-3">
        <div class="col-auto">
          <label for="guessInput" class="col-form-label fs-4">
            Enter a guess:
          </label>
        </div>

        <div class="col-md-4">
          <input
            type="number"
            id="guessInput"
            class="form-control form-control-lg"
            min="1"
            max="10"
          >
        </div>

        <div class="col-auto">
          <button
            class="btn btn-secondary btn-lg"
            onclick="checkGuess()"
          >
            Submit Guess
          </button>
        </div>
      </div>

   
      <div id="message" class="mt-4"></div>
    </div>
  </div>

 
  <script src="pro.js"></script>
</body>
</html>
