<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Bill Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="pro5.css" />
  </head>
  <body>
    <div id="container" class="m-4 justify-content-center align-content-center  ">
      <div id="forms" class="w-75 m-auto pt-4">
        <div id="head" class="border rounded-3 text-center">
          <!-- <h2>Travel Bill Calculator</h2> -->
        </div>
        <form
          action=""
          class="bg-white border rounded-3 shadow mt-3 p-5 d-flex flex-column gap-3"
        >
         <h2>Travel Bill Calculator</h2>
          <label for="billAmount"> Kilometers covered
 </label>
          <input type="number" class="form-control InputBox" id="totleKm" />

          <div>
            <button
              type="submit"
              class="btn btn-primary border rounded-3 mb-4 mt-2"
            >
              Calculate
            </button>
            <button
              type="reset"
              class="btn btn-primary border rounded-3 mb-4 mt-2"
            >
              Reset
            </button>
          </div>
          <div id="" clas="  text-center d-flex flex-column m-auto">
            <div class="fw-bold">Total Km: <span id="Km">XX Km</span></div>
            <div class="fw-bold">
              calculation Breakdown: <span id="Breakdown">XX ₹</span>
            </div>

            
            <div class="fw-bold">
              Total Bill: <span id="totalBill">XX ₹</span>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="pro5.js"></script>
  </body>
</html>
