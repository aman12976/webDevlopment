<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <title>Form</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to right, #4e73df, #3a5edb);
    }

    .card {
      padding: 25px;
      border-radius: 10px;
    }

    /* underline input */
    .custom-input {
      border: none;
      border-bottom: 2px solid #ccc;
      border-radius: 0;
    }

    .custom-input:focus {
      box-shadow: none;
      border-bottom: 2px solid #4e73df;
    }

    .input-group-text {
      background: transparent;
      border: none;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="d-flex justify-content-center align-items-center min-vh-100 gap-4 flex-wrap">

    <!-- LOGIN -->
    <div class="card shadow col-md-4">
      <h4 class="mb-4">Login</h4>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control custom-input" placeholder="Enter your email">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control custom-input" placeholder="Enter password">
        <span class="input-group-text"><i class="bi bi-eye"></i></span>
      </div>

      <div class="d-flex justify-content-between mb-3">
        <div>
          <input type="checkbox"> Remember me
        </div>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn btn-primary w-100">Login Now</button>

      <p class="text-center mt-3">
        Don’t have an account? <a href="#">Signup</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="card shadow col-md-4">
      <h4 class="mb-4">Registration</h4>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control custom-input" placeholder="Enter your name">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control custom-input" placeholder="Enter your email">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control custom-input" placeholder="Create password">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control custom-input" placeholder="Confirm password">
        <span class="input-group-text"><i class="bi bi-eye"></i></span>
      </div>

      <div class="mb-3">
        <input type="checkbox"> I accept all terms & conditions
      </div>

      <button class="btn btn-primary w-100">Register Now</button>

      <p class="text-center mt-3">
        Already have an account? <a href="#">Login</a>
      </p>
    </div>

  </div>
</div>

</body>
</html>
