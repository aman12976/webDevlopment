<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
     <style>
       
   .hide input {
    border: none;             
    outline:none;            
    background: transparent;   
    border-bottom: 1px solid #ccc;
    } 
   
    </style>

  </head>
  <body>
    <div
      class="main d-flex gap-5 justify-content-center align-items-center vh-100 border bg-primary "
    >
 <!-- login form -->
      <div class="login d-flex flex-column gap-3 border border-bottom p-3 rounded pb-5 bg-light ">
        <h1><u>Lo</u>gin</h1>
        <div class="hide">
          <i class="bi bi-envelope"></i>
          <input
          class="form"
            type="text"
            id="email"
            name="email"
            placeholder="enter your email"
          />
        </div>
        <div class="hide">
          <i class="bi bi-lock"></i>
          <input
          
            type="text"
            name="password"
            id="password"
            placeholder="confirm a password"
          />
          <i class="bi bi-eye"></i>
        </div>
        <div class="d-flex justify-content-between align-items-center gap-3">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
          <a href="#" class="text-decoration-none">forgot password?</a>
        </div>

        <div>
          <button type="submit" class="btn btn-primary w-100" id="hv">Login Now</button>
        </div>
        <p>Don't have an account? <a href="#" class="text-decoration-none">Sign up</a></p>
      </div>


      <!-- resister form -->

      <div class="resister d-flex flex-column gap-3 border p-4 rounded bg-light">
        <h1><u>Re</u>gistration</h1>

        <div class="hide">
          <i class="bi bi-person"></i>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="enter your name"
          />
        </div>
        <div class="hide">
          <i class="bi bi-envelope"></i>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="enter your email"
          />
        </div>
        <div class="hide">
          <i class="bi bi-lock"></i>
          <input
            type="text"
            name="password"
            id="password"
            placeholder="confirm a password"
          />
        </div>
        <div class="hide">
          <i class="bi bi-lock"></i>
          <input
            type="text"
            name="password"
            id="password"
            placeholder="confirm a password"
          />
          <i class="bi bi-eye"></i>
        </div>
        <div>
          <input type="checkbox" id="remember" />
          <label for="remember">I accept all terms and conditions</label>
        </div>

        <div>
          <button type="submit" class="btn btn-primary w-100" id="hv">Register Now</button>
        </div>
        <p>Already have an account? <a href="#" class="text-decoration-none">Login now</a></p>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
