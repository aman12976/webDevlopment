<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const arr = [1, 2, 3, 4, 5];
        console.log(arr);
        arr.push(6);
        console.log(arr);
        arr.pop();
        console.log(arr);
        arr.unshift(0);
        console.log(arr);
        arr.shift();
        console.log(arr);
        arr.splice(2, 0, 'a', 'b');
        console.log(arr);
        arr.splice(2, 2);
        console.log(arr);
        arr.reverse();
        console.log(arr);
        arr.sort();
        console.log(arr);
        arr.forEach((item) => {
            console.log(item);
        });
        arr.map((item) => {
            return item * 2;
        });
        console.log(arr);
        arr.filter((item) => {
            return item > 2;
        });
        console.log(arr);
        arr.reduce((acc, item) => {
            return acc + item;
        }, 0);
        console.log(arr);
        arr.slice(1, 4);
        console.log(arr);
        arr.join('-');
        console.log(arr);
        arr.concat([60, 7, 8]);
        console.log(arr);
        arr.includes(3);
        console.log(arr);
        arr.indexOf(3);
        console.log(arr);
        arr.lastIndexOf(3);
        console.log(arr);
        console.log(Array.isArray(arr));
        arr.length = 3;
        console.log(arr);
        arr.length = 5;
        console.log(arr);
        arr.fill(0, 1, 4);
        console.log(arr);
        arr.copyWithin(0, 2, 4);
        console.log(arr);
        




    </script>
</body>
</html>
