<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <section class="help-section">

  <div class="help-box">

    <h1><span><svg xmlns="http://www.w3.org/2000/svg" width="20" height="25" fill="currentColor" class="bi bi-question-lg" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M4.475 5.458c-.284 0-.514-.237-.47-.517C4.28 3.24 5.576 2 7.825 2c2.25 0 3.767 1.36 3.767 3.215 0 1.344-.665 2.288-1.79 2.973-1.1.659-1.414 1.118-1.414 2.01v.03a.5.5 0 0 1-.5.5h-.77a.5.5 0 0 1-.5-.495l-.003-.2c-.043-1.221.477-2.001 1.645-2.712 1.03-.632 1.397-1.135 1.397-2.028 0-.979-.758-1.698-1.926-1.698-1.009 0-1.71.529-1.938 1.402-.066.254-.278.461-.54.461h-.777ZM7.496 14c.622 0 1.095-.474 1.095-1.09 0-.618-.473-1.092-1.095-1.092-.606 0-1.087.474-1.087 1.091S6.89 14 7.496 14"/>
</svg></span> Help Center</h1>
    <p>Browse FAQs or submit a support ticket below.</p>

    <div class="help-container">

      <!-- LEFT FAQ -->
      <div class="faq">
        <h3>FREQUENTLY ASKED QUESTIONS</h3>

        <div class="faq-item">How do I track my order? <span>+</span></div>
        <div class="faq-item">How do I get a refund? <span>+</span></div>
        <div class="faq-item">My rider is late. What do I do? <span>+</span></div>
        <div class="faq-item">How do I update my account info? <span>+</span></div>
      </div>

      <!-- RIGHT FORM -->
      <div class="ticket">
        <h3>SUBMIT A SUPPORT TICKET</h3>

        <input type="text" placeholder="Enter your full name">
        <input type="email" placeholder="Enter your email">
        <select>
          <option>Select issue type</option>
        </select>
        <input type="text" placeholder="e.g. ORD-00123">
        <textarea placeholder="Please describe the problem in detail..."></textarea>

        <button>Submit Ticket</button>
      </div>

    </div>

  </div>

</section>
<script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
