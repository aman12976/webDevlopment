<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <section class="help-section">

  <div class="help-box">

    <h1>❓ Help Center</h1>
    <p>Browse FAQs or submit a support ticket below.</p>

    <div class="help-container">

      <!-- LEFT FAQ -->
      <div class="faq">
        <h3>FREQUENTLY ASKED QUESTIONS</h3>

        <div class="faq-item">How do I track my order? <span>+</span></div>
        <div class="faq-item">How do I get a refund? <span>+</span></div>
        <div class="faq-item">My rider is late. What do I do? <span>+</span></div>
        <div class="faq-item">How do I update my account info? <span>+</span></div>
      </div>

      <!-- RIGHT FORM -->
      <div class="ticket">
        <h3>SUBMIT A SUPPORT TICKET</h3>

        <input type="text" placeholder="Enter your full name">
        <input type="email" placeholder="Enter your email">
        <select>
          <option>Select issue type</option>
        </select>
        <input type="text" placeholder="e.g. ORD-00123">
        <textarea placeholder="Please describe the problem in detail..."></textarea>

        <button>Submit Ticket</button>
      </div>

    </div>

  </div>

</section>
</body>
</html>
