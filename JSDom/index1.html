<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-grid mt-5 gap-4">
        <h1>Information form</h1>

        <input type="text" id="fullName"placeholder="Enter your name" class="form-control">
        <input type="text" id="city"placeholder="Enter your City name" class="form-control">
        <input type="text" id="email"placeholder="Enter your Email" class="form-control">
        <input type="password" id="Passward"placeholder="Enter your Passward" class="form-control">
        <button class="btn btn-primary" onclick="Submit()"">Submit</button> 
        
        

    </div>
    <hr>
    <div class=" border border-2 rounded-3 shadow w-25 p-4 divHide bg-info" id="dataCard">
        <span>Name:</span>
        <span id="myData"></span>
        <br>
        <span>City:</span>
        <span id="myData2"></span>
        <br>
        <span>Email:</span>
        <span id="myData3"></span>
        <br>

        <span>Passward:</span>
        <span id="myData4"></span>
        <br>


    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
</body>
</html>
